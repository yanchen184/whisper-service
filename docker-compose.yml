services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./web:/web
      - model-cache:/root/.cache
    environment:
      - STREAM_MODEL=${STREAM_MODEL:-base}
      - DEVICE=${DEVICE:-auto}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # GPU support: uncomment below if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  model-cache:
