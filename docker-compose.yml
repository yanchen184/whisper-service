services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./web:/web
      - model-cache:/home/appuser/.cache
    environment:
      - STREAM_MODEL=${STREAM_MODEL:-phate334/Breeze-ASR-25-ct2}
      - DEVICE=${DEVICE:-auto}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-5}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # GPU support: uncomment below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  model-cache:
