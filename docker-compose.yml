services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        STREAM_MODEL: ${STREAM_MODEL:-phate334/Breeze-ASR-25-ct2}
    ports:
      - "8000:8000"
    environment:
      - STREAM_MODEL=${STREAM_MODEL:-phate334/Breeze-ASR-25-ct2}
      - DEVICE=${DEVICE:-auto}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-20}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llm:8001/v1}
      - LLM_MODEL=${LLM_MODEL:-MediaTek-Research/Breeze-2-8B-Instruct}
    volumes:
      - ./api/data:/app/data:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      - llm
    # GPU support: uncomment below to run Whisper on GPUпјҲе»әиӯ°з•ҷ CPUпјҢжҠҠ GPU зөҰ llm з”Ёпјү
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
      args:
        LLM_MODEL: ${LLM_MODEL:-MediaTek-Research/Breeze-2-8B-Instruct}
    ports:
      - "8001:8001"
    restart: unless-stopped
    # LLM еҝ…й Ҳеҗғ GPUпјҲ8B жЁЎеһӢ CPU и·‘дёҚеӢ•пјү
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped
