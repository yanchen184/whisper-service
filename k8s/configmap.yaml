apiVersion: v1
kind: ConfigMap
metadata:
  name: whisper-config
  namespace: whisper
data:
  # 模型
  STREAM_MODEL: "phate334/Breeze-ASR-25-ct2"
  DEVICE: "cuda"
  COMPUTE_TYPE: "float16"

  # 連線
  MAX_CONNECTIONS: "20"
  DEFAULT_LANGUAGE: "zh"

  # 前端 VAD（瀏覽器偵測停頓切段）
  VAD_SILENCE_THRESHOLD: "0.015"
  VAD_SILENCE_DURATION_MS: "800"
  VAD_MIN_SPEECH_MS: "500"
  VAD_MAX_CHUNK_MS: "10000"

  # 後端 VAD（faster-whisper 過濾靜音）
  BACKEND_VAD_ENABLED: "false"
  BACKEND_VAD_THRESHOLD: "0.3"
  BACKEND_VAD_SILENCE_MS: "300"
  BACKEND_VAD_SPEECH_PAD_MS: "200"

  # LLM 服務
  LLM_BASE_URL: "http://llm:8001/v1"
  LLM_MODEL: "MediaTek-Research/Breeze-2-8B-Instruct"
  LLM_MAX_TOKENS: "2048"
  LLM_TEMPERATURE: "0.3"

  # CORS（⚠️ 目前全開，正式上線前請改為具體網域，見 README 第三章）
  CORS_ORIGINS: "*"
