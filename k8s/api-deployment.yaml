apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
  namespace: whisper
spec:
  accessModes: [ReadOnlyMany]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-data
  namespace: whisper
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: whisper
spec:
  replicas: 2  # 10人同時用需要 2+ replicas，每個綁一張 GPU
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: whisper-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: whisper-config
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: upload-data
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /api/models
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/models
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: whisper
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
