apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: whisper-service:latest
          imagePullPolicy: Never
          command: [arq, app.worker.WorkerSettings]
          envFrom:
            - configMapRef:
                name: whisper-config
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: upload-data
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
