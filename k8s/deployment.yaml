apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: whisper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: whisper-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: whisper-config
          # 單 GPU 部署策略：GPU 留給 llm（Breeze-2-8B），api 走 CPU
          # Breeze-ASR-25 模型小（~1.5GB），CPU + int8 量化版本可用
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
