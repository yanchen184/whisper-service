<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper 即時轉錄</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 2rem; }
  .container { max-width: 800px; width: 100%; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: #94a3b8; margin-bottom: 2rem; }

  .lang-selector { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .lang-selector label { display: flex; align-items: center; gap: 0.4rem; color: #cbd5e1; cursor: pointer; font-size: 0.9rem; }

  .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
  .stream-btn { padding: 0.75rem 2rem; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.2s; }
  .stream-btn.start { background: #22c55e; color: white; }
  .stream-btn.start:hover { background: #16a34a; }
  .stream-btn.stop { background: #dc2626; color: white; animation: pulse 1.2s infinite; }
  .stream-btn.stop:hover { background: #b91c1c; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); } 50% { box-shadow: 0 0 0 12px rgba(220,38,38,0); } }

  .status { display: flex; align-items: center; gap: 0.5rem; color: #94a3b8; font-size: 0.85rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ready { background: #22c55e; }
  .dot.off { background: #64748b; }
  .dot.listening { background: #22c55e; animation: pulse 1.2s infinite; }
  .dot.loading { background: #eab308; animation: pulse 0.8s infinite; }

  .output { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 1.5rem; min-height: 300px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; line-height: 2; font-size: 1.1rem; outline: none; }
  .output:focus { border-color: #3b82f6; }
  .output[contenteditable]::before { content: attr(data-placeholder); color: #475569; }
  .output:not(:empty)::before { display: none; }

  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; }
  .btn { padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; background: transparent; border: 1px solid #475569; color: #e2e8f0; }
  .btn:hover { background: #1e293b; }
  .btn.primary { background: #3b82f6; color: white; border: none; }
  .btn.primary:hover { background: #2563eb; }
  .btn.primary:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }

  .report-section { margin-top: 1.5rem; display: none; }
  .report-section.visible { display: block; }
  .report-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .report-tag { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
  .report-tag.meeting { background: #1e3a5f; color: #60a5fa; }
  .report-tag.medical { background: #3b1f1f; color: #f87171; }
  .report-tag.interview { background: #1f3b2e; color: #4ade80; }
  .report-tag.memo { background: #3b3520; color: #facc15; }
  .report-tag.other { background: #2d2d3d; color: #a78bfa; }
  .report-content { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1.5rem; line-height: 1.8; font-size: 1rem; }
  .report-content h3 { color: #93c5fd; margin: 1rem 0 0.5rem; font-size: 0.95rem; }
  .report-content h3:first-child { margin-top: 0; }
  .report-content p { margin-bottom: 0.5rem; }
  .report-content ul { margin: 0.25rem 0 0.5rem 1.5rem; }
  .report-content li { margin-bottom: 0.25rem; }

  .hint { margin-top: 1rem; color: #64748b; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Whisper 即時轉錄</h1>
  <p class="subtitle">對著麥克風說話，文字即時出現</p>

  <div class="lang-selector">
    <label><input type="radio" name="lang" value="zh" checked> 中文</label>
    <label><input type="radio" name="lang" value="en"> English</label>
    <label><input type="radio" name="lang" value="auto"> 自動偵測</label>
  </div>

  <div class="controls">
    <button class="stream-btn start" id="btn" onclick="toggle()">開始辨識</button>
    <div class="status">
      <span class="dot ready" id="dot"></span>
      <span id="statusText">點擊開始辨識</span>
    </div>
  </div>

  <div class="output" id="output" contenteditable="true" data-placeholder="轉錄文字會出現在這裡，你也可以手動編輯..."></div>

  <div class="actions">
    <button class="btn" onclick="copyText(this)">複製全部文字</button>
    <button class="btn" onclick="clearText()">清除</button>
    <button class="btn primary" id="reportBtn" onclick="generateReport()" disabled>產生報告</button>
  </div>

  <div class="report-section" id="reportSection">
    <div class="report-header">
      <span>報告結果</span>
      <span class="report-tag" id="reportTag"></span>
      <button class="btn" style="margin-left:auto;" onclick="copyReport(this)">複製報告</button>
    </div>
    <div class="report-content" id="reportContent"></div>
  </div>

  <p class="hint">瀏覽器 VAD 偵測停頓自動切段 → WebSocket → faster-whisper 即時辨識。編輯文字後按「產生報告」送 LLM 潤飾分類。</p>
</div>

<script>
let ws = null;
let streaming = false;
let recorder = null;
let micStream = null;
let audioCtx = null;
let analyser = null;
let vadTimer = null;
let isSpeaking = false;
let silenceStart = 0;

// VAD 參數（啟動時從 /api/config 載入，可透過 K8s ConfigMap 調整）
let SILENCE_THRESHOLD = 0.015;
let SILENCE_DURATION = 800;
let MIN_SPEECH_DURATION = 500;
let MAX_CHUNK_DURATION = 10000;
let speechStart = 0;

// 啟動時載入 VAD 設定
fetch('/api/config').then(r => r.json()).then(cfg => {
  SILENCE_THRESHOLD = cfg.vad_silence_threshold ?? SILENCE_THRESHOLD;
  SILENCE_DURATION = cfg.vad_silence_duration_ms ?? SILENCE_DURATION;
  MIN_SPEECH_DURATION = cfg.vad_min_speech_ms ?? MIN_SPEECH_DURATION;
  MAX_CHUNK_DURATION = cfg.vad_max_chunk_ms ?? MAX_CHUNK_DURATION;
}).catch(() => {});

function toggle() {
  if (streaming) stop();
  else start();
}

function getSupportedMime() {
  for (const m of ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg']) {
    if (MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

async function start() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    alert('無法存取麥克風，請確認瀏覽器已授權。');
    return;
  }

  const lang = document.querySelector('input[name="lang"]:checked').value;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/api/stream`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ action: 'start', language: lang }));
    setUI('loading');
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'status') {
      if (data.message === 'started') { streaming = true; setUI('listening'); startCapture(); }
      else if (data.message === 'stopped') { streaming = false; setUI('off'); }
      else if (data.message === 'loading') { setUI('loading'); }
    } else if (data.type === 'transcript') {
      appendText(data.text);
    } else if (data.type === 'error') {
      alert(data.message);
      stop();
    }
  };

  ws.onclose = () => {
    if (streaming) {
      setUI('off');
      appendText('\n[連線中斷，3 秒後重連...]\n');
      setTimeout(() => { if (!streaming) return; stopCapture(); start(); }, 3000);
    } else {
      stopCapture(); setUI('off');
    }
  };
  ws.onerror = () => { stop(); alert('無法連線到伺服器'); };
}

function startCapture() {
  if (!micStream) return;

  // Web Audio API — 分析音量做 VAD
  audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  // MediaRecorder — 錄音
  recorder = new MediaRecorder(micStream, { mimeType: getSupportedMime() });
  recorder.ondataavailable = (e) => {
    if (e.data.size > 0 && ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
  };

  isSpeaking = false;
  silenceStart = 0;
  speechStart = 0;

  // 每 50ms 檢查一次音量
  vadTimer = setInterval(() => {
    const data = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);
    const rms = Math.sqrt(data.reduce((sum, v) => sum + v * v, 0) / data.length);
    const now = Date.now();

    if (rms > SILENCE_THRESHOLD) {
      // 有聲音
      silenceStart = 0;
      if (!isSpeaking) {
        // 開始說話 → 開始錄音
        isSpeaking = true;
        speechStart = now;
        recorder.start();
      }
    } else if (isSpeaking) {
      // 靜音中
      if (silenceStart === 0) silenceStart = now;
      const silenceDuration = now - silenceStart;
      const speechDuration = now - speechStart;

      // 靜音超過門檻 且 語音夠長 → 切段送出
      if (silenceDuration >= SILENCE_DURATION && speechDuration >= MIN_SPEECH_DURATION) {
        recorder.stop();
        isSpeaking = false;
        silenceStart = 0;
      }
    }

    // 超過最大長度強制切段
    if (isSpeaking && (Date.now() - speechStart) >= MAX_CHUNK_DURATION) {
      recorder.stop();
      isSpeaking = false;
      silenceStart = 0;
    }
  }, 50);
}

function stopCapture() {
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  if (recorder && recorder.state === 'recording') recorder.stop();
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  recorder = null;
  analyser = null;
  isSpeaking = false;
}

function stop() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'stop' }));
    ws.close();
  }
  stopCapture();
  streaming = false;
  setUI('off');
}

function setUI(state) {
  const btn = document.getElementById('btn');
  const dot = document.getElementById('dot');
  const st = document.getElementById('statusText');
  if (state === 'listening') {
    btn.textContent = '停止辨識'; btn.className = 'stream-btn stop';
    dot.className = 'dot listening'; st.textContent = '辨識中... 對著麥克風說話';
  } else if (state === 'loading') {
    btn.textContent = '載入中...'; btn.className = 'stream-btn stop';
    dot.className = 'dot loading'; st.textContent = '模型載入中...';
  } else {
    btn.textContent = '開始辨識'; btn.className = 'stream-btn start';
    dot.className = 'dot ready'; st.textContent = '點擊開始辨識';
  }
}

function appendText(text) {
  const el = document.getElementById('output');
  el.textContent += text + '\n';
  el.scrollTop = el.scrollHeight;
}

function clearText() {
  document.getElementById('output').textContent = '';
  document.getElementById('reportSection').classList.remove('visible');
  document.getElementById('reportBtn').disabled = true;
}

function copyText(btn) {
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
    btn.textContent = '已複製!';
    setTimeout(() => btn.textContent = '複製全部文字', 1500);
  });
}

// 監聽 output 內容變化，啟用/停用「產生報告」按鈕
const outputEl = document.getElementById('output');
const observer = new MutationObserver(() => {
  document.getElementById('reportBtn').disabled = !outputEl.textContent.trim();
});
observer.observe(outputEl, { childList: true, characterData: true, subtree: true });

async function generateReport() {
  const text = document.getElementById('output').textContent.trim();
  if (!text) return;

  const btn = document.getElementById('reportBtn');
  btn.disabled = true;
  btn.textContent = '產生中...';

  try {
    const resp = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: text }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      alert(err.error || '產生報告失敗');
      return;
    }

    const data = await resp.json();
    renderReport(data);
  } catch (e) {
    alert('無法連線到 LLM 服務: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '產生報告';
  }
}

function renderReport(data) {
  const section = document.getElementById('reportSection');
  const tag = document.getElementById('reportTag');
  const content = document.getElementById('reportContent');

  const tagLabels = { meeting: '會議記錄', medical: '醫療紀錄', interview: '訪談紀錄', memo: '備忘錄', other: '其他' };
  tag.textContent = tagLabels[data.tag] || data.tag;
  tag.className = 'report-tag ' + (data.tag || 'other');

  let html = '<h3>潤飾文字</h3><p>' + escapeHtml(data.polished || '') + '</p>';

  if (data.structured) {
    const s = data.structured;
    const entries = Object.entries(s);
    for (const [key, val] of entries) {
      const label = fieldLabel(key);
      if (val === null || val === undefined || val === '') continue;
      if (Array.isArray(val)) {
        if (val.length === 0) continue;
        html += '<h3>' + label + '</h3><ul>' + val.map(v => '<li>' + escapeHtml(v) + '</li>').join('') + '</ul>';
      } else {
        html += '<h3>' + label + '</h3><p>' + escapeHtml(String(val)) + '</p>';
      }
    }
  }

  content.innerHTML = html;
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth' });
}

function fieldLabel(key) {
  const labels = {
    title: '標題', date: '日期', participants: '與會人員', summary: '摘要',
    action_items: '待辦事項', decisions: '決議事項', patient: '患者資訊',
    chief_complaint: '主訴', history: '病史', assessment: '評估', plan: '處置計畫',
    interviewee: '受訪者', topic: '主題', key_points: '重點摘錄', quotes: '重要引述',
    subject: '主旨', body: '內容', action_required: '需處理事項', content: '內容',
  };
  return labels[key] || key;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function copyReport(btn) {
  const text = document.getElementById('reportContent').innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製!';
    setTimeout(() => btn.textContent = '複製報告', 1500);
  });
}
</script>
</body>
</html>
